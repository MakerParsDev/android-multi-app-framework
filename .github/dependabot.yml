version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:17'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'
    cooldown:
      default-days: 7

  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:27'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /side-projects/admin-notifications
    schedule:
      interval: weekly
      day: monday
      time: '05:37'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /side-projects/firebase/functions
