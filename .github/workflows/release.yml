name: Release

on:
  workflow_dispatch:
    inputs:
      target_flavors:
        description: 'Target flavors (comma-separated or "all")'
        required: true
        default: 'all'
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release
      do_quality:
        description: 'Run quality checks before build'
        required: true
        default: true
        type: boolean
      do_build:
        description: 'Build APK/AAB'
        required: true
        default: true
        type: boolean
      do_internal_test:
        description: 'Publish to Play internal track'
        required: true
        default: false
        type: boolean
      do_publish:
        description: 'Publish to Play production track'
        required: true
        default: false
        type: boolean
      update_play_listing:
        description: 'Update Play listing metadata'
        required: true
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  GRADLE_OPTS: '-Djava.awt.headless=true -Dorg.gradle.workers.max=2 -Dorg.gradle.daemon=false -Dksp.incremental=false'
  DOPPLER_PROJECT: android-multi-app-framework
  DOPPLER_CONFIG: prod
  JAVA_VERSION: '21'

jobs:
  security-gate:
    name: Pre-release Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'

      - name: Run security gate
        run: bash scripts/ci/security_gate.sh --mode history

      - name: Validate secret scan policy
        run: python3 scripts/ci/validate_secret_scan_policy.py

      - name: Validate tracked sensitive files
        run: python3 scripts/ci/validate_tracked_sensitive_files.py

      - name: Run admin backend smoke test
        env:
          EXPECTED_ADMIN_BACKEND_GIT_SHA: ${{ github.sha }}
        run: python3 ./scripts/ci/admin_backend_smoke.py

  resolve-flavors:
    name: Resolve Flavors
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      flavors_json: ${{ steps.resolve.outputs.flavors_json }}
      flavors_csv: ${{ steps.resolve.outputs.flavors_csv }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Resolve flavors
        id: resolve
        run: |
          set -euo pipefail
          INPUT="${{ inputs.target_flavors }}"
          INPUT="$(echo "$INPUT" | tr -d '[:space:]')"

          ALL_JSON="$(./gradlew -q printFlavors | tr -d '\r')"
          mapfile -t ALL < <(
            echo "$ALL_JSON" | tr -d '[]"' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d'
          )

          RESOLVED=()
          if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
            RESOLVED=("${ALL[@]}")
          elif [[ "$INPUT" == *","* ]]; then
            IFS=',' read -ra REQ <<< "$INPUT"
            for r in "${REQ[@]}"; do
              [ -z "$r" ] && continue
              RESOLVED+=("$r")
            done
          else
            RESOLVED+=("$INPUT")
          fi

          out="["
          first=true
          for f in "${RESOLVED[@]}"; do
            if [ "$first" = false ]; then out+=","; fi
            out+="\"$f\""
            first=false
          done
          out+="]"

          csv="$(IFS=,; echo "${RESOLVED[*]}")"
          echo "flavors_json=$out" >> "$GITHUB_OUTPUT"
          echo "flavors_csv=$csv" >> "$GITHUB_OUTPUT"

  build-release:
    name: Build Signed Release
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [security-gate, resolve-flavors]
    if: inputs.do_build
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Verify side projects
        if: inputs.do_quality
        run: bash scripts/ci/run_side_project_quality.sh --install

      - name: Install Doppler CLI
        run: |
          if ! command -v doppler >/dev/null 2>&1; then
            curl -fsSL https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key \
              | sudo gpg --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
            echo 'deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] https://packages.doppler.com/public/cli/deb/debian any-version main' \
              | sudo tee /etc/apt/sources.list.d/doppler-cli.list >/dev/null
            sudo apt-get update -y >/dev/null
            sudo apt-get install -y doppler >/dev/null
          fi

      - name: Setup Android SDK
        run: bash scripts/ci/setup-android-sdk.sh

      - name: Materialize Firebase configs
        if: inputs.do_quality || inputs.do_internal_test || inputs.do_publish
        env:
          FIREBASE_CONFIGS_ZIP_BASE64: ${{ secrets.FIREBASE_CONFIGS_ZIP_BASE64 }}
          FIREBASE_WEB_CLIENT_ID: ${{ secrets.FIREBASE_WEB_CLIENT_ID }}
        run: |
          python3 scripts/ci/materialize_firebase_configs.py \
            --flavors "${{ needs.resolve-flavors.outputs.flavors_csv }}" \
            --mode strict
          python3 scripts/ci/verify_google_signin_config.py \
            --flavors "${{ needs.resolve-flavors.outputs.flavors_csv }}" \
            --require-web-client-id

      - name: Decode keystore
        if: inputs.do_build && inputs.build_type == 'Release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "::add-mask::${KEYSTORE_PASSWORD}"
          echo "::add-mask::${KEY_PASSWORD}"
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
          echo "KEYSTORE_FILE=/tmp/release.jks" >> "$GITHUB_ENV"
          bash scripts/ci/verify_release_signing_config.sh

      - name: Run quality checks
        if: inputs.do_quality
        env:
          VALIDATION_MODE: warn
        run: |
          python3 scripts/ci/validate_ci_apps_catalog.py \
            --mode warn \
            --target-flavors "${{ needs.resolve-flavors.outputs.flavors_csv }}"
          python3 scripts/ci/validate_admob_inventory.py \
            --mode warn \
            --target-flavors "${{ needs.resolve-flavors.outputs.flavors_csv }}"
          ./gradlew detekt ktlintCheck --stacktrace --no-daemon --max-workers=2

      - name: Auto-bump Play version codes
        if: (inputs.do_internal_test || inputs.do_publish) && inputs.build_type == 'Release'
        env:
          PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON_BASE64" | tr -d '\r\n\t ' | base64 -d > /tmp/service-account.json
          echo "PLAY_SERVICE_ACCOUNT_JSON=/tmp/service-account.json" >> "$GITHUB_ENV"
          echo "::add-mask::$(cat /tmp/service-account.json | head -c 20)"
          python3 scripts/ci/verify_play_service_account_project.py --expected-project-id makerpars-oaslananka-mobil
          python3 -m pip install --quiet google-api-python-client google-auth
          python3 scripts/ci/fetch_play_version_codes.py \
            --flavors "${{ needs.resolve-flavors.outputs.flavors_csv }}" \
            --tracks all \
            --suggest-next \
            --apply-to-app-versions \
            --sync-version-names

      - name: Build AABs
        if: inputs.do_build
        run: |
          set -euo pipefail
          BUILD_TYPE="${{ inputs.build_type }}"
          FLAVORS_JSON='${{ needs.resolve-flavors.outputs.flavors_json }}'
          mapfile -t FLAVORS < <(
            echo "$FLAVORS_JSON" | tr -d '[]"' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d'
          )
          TASKS=()
          for flavor in "${FLAVORS[@]}"; do
            [ -z "$flavor" ] && continue
            cap="$(tr '[:lower:]' '[:upper:]' <<< "${flavor:0:1}")${flavor:1}"
            if [ "$BUILD_TYPE" = "Release" ] && { [ "${{ inputs.do_internal_test }}" = "true" ] || [ "${{ inputs.do_publish }}" = "true" ]; }; then
              TASKS+=("bundle${cap}Release")
            else
              TASKS+=("assemble${cap}${BUILD_TYPE}")
            fi
          done
          echo "Running Gradle tasks: ${TASKS[*]}"
          ./gradlew "${TASKS[@]}" --stacktrace --no-daemon --max-workers=2
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-build-outputs
          path: app/build/outputs/
          retention-days: 7

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f /tmp/release.jks /tmp/service-account.json firebase_configs.zip || true

  publish-play:
    name: Publish to Play Console
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-release, resolve-flavors]
    if: inputs.do_internal_test || inputs.do_publish
    environment: production
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Download build outputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-build-outputs
          path: app/build/outputs/

      - name: Decode secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          echo "::add-mask::${KEYSTORE_PASSWORD}"
          echo "::add-mask::${KEY_PASSWORD}"
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
          echo "$PLAY_SERVICE_ACCOUNT_JSON_BASE64" | tr -d '\r\n\t ' | base64 -d > /tmp/service-account.json
          echo "::add-mask::$(cat /tmp/service-account.json | head -c 20)"
          echo "KEYSTORE_FILE=/tmp/release.jks" >> "$GITHUB_ENV"
          echo "PLAY_SERVICE_ACCOUNT_JSON=/tmp/service-account.json" >> "$GITHUB_ENV"

      - name: Verify Play Console access
        env:
          PLAY_SERVICE_ACCOUNT_JSON: /tmp/service-account.json
        run: |
          python3 -m pip install --quiet google-api-python-client google-auth
          python3 scripts/ci/verify_play_console_access.py \
            --flavors "${{ needs.resolve-flavors.outputs.flavors_csv }}"

      - name: Publish to Play
        env:
          PLAY_SERVICE_ACCOUNT_JSON: /tmp/service-account.json
          KEYSTORE_FILE: /tmp/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          FLAVORS_JSON='${{ needs.resolve-flavors.outputs.flavors_json }}'
          mapfile -t FLAVORS < <(
            echo "$FLAVORS_JSON" | tr -d '[]"' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d'
          )
          TRACK="internal"
          ${{ inputs.do_publish }} && TRACK="production"
          TASKS=()
          for flavor in "${FLAVORS[@]}"; do
            [ -z "$flavor" ] && continue
            cap="$(tr '[:lower:]' '[:upper:]' <<< "${flavor:0:1}")${flavor:1}"
            ${{ inputs.update_play_listing }} && TASKS+=("publish${cap}ReleaseListing")
            TASKS+=("publish${cap}ReleaseBundle")
          done
          echo "Publishing tasks: ${TASKS[*]}"
          ./gradlew "${TASKS[@]}" -PPLAY_TRACK="$TRACK" --stacktrace --no-daemon --max-workers=2

      - name: Cleanup secrets
        if: always()
        run: rm -f /tmp/release.jks /tmp/service-account.json || true
