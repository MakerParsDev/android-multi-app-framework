name: Dependency Audit

on:
  schedule:
    - cron: '0 3 * * 1' # Monday 03:00 UTC
  workflow_dispatch:

concurrency:
  group: dependency-audit
  cancel-in-progress: false

permissions:
  contents: read

env:
  GRADLE_OPTS: '-Djava.awt.headless=true -Dorg.gradle.workers.max=1 -Dorg.gradle.daemon=false -Dksp.incremental=false'
  JAVA_VERSION: '21'

jobs:
  audit:
    name: Dependency Lifecycle Audit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'

      - name: Install OSV-Scanner
        run: |
          curl -sL https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: OSV scan
        continue-on-error: true
        run: |
          mkdir -p build/reports/dependencies
          osv-scanner scan \
            --lockfile build.gradle.kts \
            --output build/reports/dependencies/osv-results.json \
            --format json || true

      - name: Audit dependency catalog
        run: |
          mkdir -p build/reports/dependencies
          ./gradlew auditDependencyCatalog \
            --warning-mode all --stacktrace --no-daemon --max-workers=1

      - name: Resolve runtime graph
        run: |
          mkdir -p build/reports/dependencies
          warning_log="build/reports/dependencies/resolved-amenerrasulu-runtime.txt"
          : > "$warning_log"
          ./gradlew :app:dependencies \
            --configuration amenerrasuluDebugRuntimeClasspath \
            --warning-mode all --stacktrace --no-daemon --max-workers=1 \
            2>&1 | tee "$warning_log"

      - name: Validate supply chain policy
        run: ./gradlew validateSupplyChainPolicy --warning-mode all --stacktrace --no-daemon --max-workers=1

      - name: Validate Gradle warning policy
        run: |
          python3 scripts/ci/validate_gradle_warning_report.py \
            --log build/reports/dependencies/resolved-amenerrasulu-runtime.txt || true

      - name: Collect audit reports
        if: always()
        run: python3 scripts/ci/collect_quality_reports.py || true

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-audit-reports
          path: build/reports/
          retention-days: 30
