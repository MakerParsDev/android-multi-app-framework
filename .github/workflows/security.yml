name: Security Scanning

on:
  schedule:
    - cron: '30 2 * * 1' # Monday 02:30 UTC
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: security-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_OPTS: '-Djava.awt.headless=true -Dorg.gradle.workers.max=1 -Dorg.gradle.daemon=false'
  JAVA_VERSION: '21'

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.13'

      - name: Validate secret scan policy
        run: python3 scripts/ci/validate_secret_scan_policy.py

      - name: Validate tracked sensitive files
        run: python3 scripts/ci/validate_tracked_sensitive_files.py

      - name: Run full-history secret scan
        run: bash scripts/ci/run_secret_scan.sh --mode history --report-dir build/reports/security

      - name: Run synthetic leak self-test
        run: bash scripts/ci/test_secret_gate.sh || true

      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: build/reports/security/gitleaks-history.sarif
          category: gitleaks

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: secret-scan-reports
          path: build/reports/security/
          retention-days: 30

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.13'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config auto \
            --config p/kotlin \
            --config p/android \
            --sarif \
            --output semgrep-results.sarif \
            --error \
            app/ core/ feature/ || true

      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-reports
          path: semgrep-results.sarif
          retention-days: 30

  workflow-audit:
    name: Workflow Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.13'

      - name: Install actionlint
        run: |
          curl -sL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin actionlint

      - name: Run actionlint
        continue-on-error: true
        run: actionlint .github/workflows/*.yml

      - name: Validate security pipeline
        run: python3 scripts/ci/validate_security_pipeline.py

      - name: Validate Android toolchain config
        run: python3 scripts/ci/validate_android_toolchain_config.py

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
