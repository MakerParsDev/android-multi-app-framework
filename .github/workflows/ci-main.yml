name: CI Main Quality Gate

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'core/**'
      - 'feature/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'config/**'
      - 'side-projects/**'
      - '.gitleaks.toml'
      - '.gitleaksignore'
      - 'app-versions.properties'
      - 'scripts/**'
      - '.github/workflows/ci-main.yml'

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_OPTS: '-Djava.awt.headless=true -Dorg.gradle.workers.max=2 -Dorg.gradle.daemon=false -Dksp.incremental=false'
  DOPPLER_PROJECT: android-multi-app-framework
  DOPPLER_CONFIG: prod
  JAVA_VERSION: '21'

jobs:
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.13'

      - name: Run security gate
        run: bash scripts/ci/security_gate.sh --mode history

      - name: Validate secret scan policy
        run: python3 scripts/ci/validate_secret_scan_policy.py

      - name: Validate tracked sensitive files
        run: python3 scripts/ci/validate_tracked_sensitive_files.py

      - name: Validate supply chain policy
        run: python3 scripts/ci/validate_supply_chain_policy.py

      - name: Validate secret ownership
        run: python3 scripts/ci/validate_secret_ownership.py

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-gate-reports
          path: build/reports/security/
          retention-days: 30

  side-projects:
    name: Side-project Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Verify side projects
        run: bash scripts/ci/run_side_project_quality.sh --install

  static-analysis:
    name: Detekt & Ktlint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run static analysis
        run: ./gradlew detekt ktlintCheck --stacktrace --no-daemon --max-workers=2

      - name: Collect detekt reports
        if: always()
        run: |
          mkdir -p detekt-reports
          find . -type d -path "*/build/reports/detekt" -exec cp -R {} detekt-reports/ \; || true

      - name: Upload detekt reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: detekt-reports
          path: detekt-reports/
          retention-days: 30

  validate-and-test:
    name: Validate & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Materialize Firebase configs
        if: env.FIREBASE_CONFIGS_ZIP_BASE64 != ''
        env:
          FIREBASE_CONFIGS_ZIP_BASE64: ${{ secrets.FIREBASE_CONFIGS_ZIP_BASE64 }}
        run: |
          ALL_FLAVORS="$(./gradlew -q printFlavors | tr -d '\r' | tr -d '[]"' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d' | paste -sd,)"
          python3 scripts/ci/materialize_firebase_configs.py \
            --flavors "$ALL_FLAVORS" \
            --mode warn \
            --allow-existing || true

      - name: Run version validation and unit tests
        run: ./gradlew :app:validateFlavorVersions test --stacktrace --no-daemon --max-workers=2

  android-lint:
    name: Android Lint (All Flavors)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Materialize Firebase configs for lint
        if: env.FIREBASE_CONFIGS_ZIP_BASE64 != ''
        env:
          FIREBASE_CONFIGS_ZIP_BASE64: ${{ secrets.FIREBASE_CONFIGS_ZIP_BASE64 }}
        run: |
          ALL_FLAVORS="$(./gradlew -q printFlavors | tr -d '\r' | tr -d '[]"' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d' | paste -sd,)"
          python3 scripts/ci/materialize_firebase_configs.py \
            --flavors "$ALL_FLAVORS" \
            --mode warn \
            --allow-existing || true

      - name: Run lint for all flavors
        run: |
          set -euo pipefail
          ALL_FLAVORS="$(./gradlew -q printFlavors | tr -d '\r' | tr -d '[]"' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d')"
          TASKS=()
          for flavour in $ALL_FLAVORS; do
            [ -z "$flavour" ] && continue
            FLAVOUR_CAP="$(tr '[:lower:]' '[:upper:]' <<< "${flavour:0:1}")${flavour:1}"
            TASKS+=("lint${FLAVOUR_CAP}Debug")
          done
          if [ "${#TASKS[@]}" -gt 0 ]; then
            echo "Running lint tasks: ${TASKS[*]}"
            ./gradlew "${TASKS[@]}" --stacktrace --no-daemon --max-workers=2
          fi

      - name: Collect lint reports
        if: always()
        run: |
          mkdir -p lint-reports
          if [ -d "app/build/reports" ]; then
            cp -R app/build/reports/. lint-reports/ || true
          fi

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-reports
          path: lint-reports/
          retention-days: 30

  kover-coverage:
    name: Kover Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Materialize Firebase configs
        if: env.FIREBASE_CONFIGS_ZIP_BASE64 != ''
        env:
          FIREBASE_CONFIGS_ZIP_BASE64: ${{ secrets.FIREBASE_CONFIGS_ZIP_BASE64 }}
        run: |
          ALL_FLAVORS="$(./gradlew -q printFlavors | tr -d '\r' | tr -d '[]"' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d' | paste -sd,)"
          python3 scripts/ci/materialize_firebase_configs.py \
            --flavors "$ALL_FLAVORS" \
            --mode warn \
            --allow-existing || true

      - name: Run unit tests
        run: ./gradlew test --stacktrace --no-daemon --max-workers=2

      - name: Generate Kover XML report
        run: ./gradlew koverXmlReportQuality --stacktrace --no-daemon

      - name: Verify Kover coverage threshold
        run: ./gradlew koverVerifyQuality --stacktrace --no-daemon

      - name: Validate critical coverage
        run: |
          python3 scripts/ci/validate_critical_coverage.py \
            --report build/reports/kover/xml/coverage.xml \
            --config config/critical-coverage.json

      - name: Generate Kover HTML report
        if: always()
        run: ./gradlew koverHtmlReportQuality --stacktrace --no-daemon || true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kover-reports
          path: build/reports/kover/
          retention-days: 30

  lint-baseline-budget:
    name: Lint Baseline Budget
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.13'

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Validate lint baseline budget
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: python3 scripts/ci/validate_lint_baselines.py

  aggregate-gate:
    name: Main Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [security-gate, side-projects, static-analysis, validate-and-test, android-lint, kover-coverage, lint-baseline-budget]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          set -euo pipefail
          NEEDS_JSON='{"security-gate":"${{ needs.security-gate.result }}","static-analysis":"${{ needs.static-analysis.result }}","validate-and-test":"${{ needs.validate-and-test.result }}","android-lint":"${{ needs.android-lint.result }}","kover-coverage":"${{ needs.kover-coverage.result }}","lint-baseline-budget":"${{ needs.lint-baseline-budget.result }}"}'
          failed=0
          for job in security-gate static-analysis validate-and-test android-lint kover-coverage lint-baseline-budget; do
            result=$(echo "$NEEDS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('$job','missing'))")
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error::Required job '$job' failed with result: $result"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more required quality gates failed"
            exit 1
          fi
          echo "All required quality gates passed"
