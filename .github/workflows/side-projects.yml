name: Side-project Quality

on:
  workflow_dispatch:

concurrency:
  group: side-projects
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Firebase & Cloudflare Quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.13'

      - name: Run side-project quality checks
        run: bash scripts/ci/run_side_project_quality.sh --install

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: side-project-quality-report
          path: build/reports/side-projects/
          retention-days: 14
