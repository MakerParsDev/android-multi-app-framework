name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-policy:
    name: Workflow Policy
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install workflow policy dependency
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check --no-deps -r scripts/ci/requirements-workflow-policy.txt

      - name: Test workflow policy
        run: |
          set -euo pipefail
          python3 scripts/ci/workflow_policy_test.py

      - name: Test CI load policy
        run: |
          set -euo pipefail
          python3 scripts/ci/resolve_ci_flavor_matrix_test.py
          python3 scripts/ci/ci_load_policy_test.py

      - name: Validate active workflows and actions
        run: |
          set -euo pipefail
          python3 scripts/ci/workflow_policy.py --repo .

  repository-security:
    name: Repository Security
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate tracked sensitive files
        run: |
          set -euo pipefail
          python3 scripts/ci/validate_tracked_sensitive_files.py

      - name: Verify environment contract
        run: |
          set -euo pipefail
          bash scripts/ci/verify_env_contract.sh

      - name: Test secret-free Firebase CI placeholders
        run: |
          set -euo pipefail
          python3 scripts/ci/generate_ci_google_services_test.py

      - name: Scan repository for secrets
        run: |
          set -euo pipefail
          bash scripts/ci/run_secret_scan.sh --mode dir --report-dir build/reports/security

  android-quality:
    name: Android Quality
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
    needs: [workflow-policy, repository-security]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
          check-latest: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Set up pinned Android SDK
        run: |
          set -euo pipefail
          bash scripts/ci/setup-android-sdk.sh

      - name: Validate application catalogs and toolchain
        run: |
          set -euo pipefail
          python3 scripts/ci/validate_ci_apps_catalog.py --mode strict --target-flavors all
          python3 scripts/ci/validate_admob_inventory.py --mode warn --target-flavors all
          python3 scripts/ci/validate_android_toolchain_config.py

      - name: Run static analysis and unit tests
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew detekt ktlintCheck testDebugUnitTest validateFlavorVersions --continue --no-daemon --stacktrace --max-workers=2

  resolve-apps:
    name: Resolve App Matrix
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
    needs: [workflow-policy, repository-security]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      flavors: ${{ steps.catalog.outputs.flavors }}
      count: ${{ steps.catalog.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve all app flavors
        id: catalog
        run: |
          set -euo pipefail
          python3 scripts/ci/resolve_ci_flavor_matrix.py >> "$GITHUB_OUTPUT"

  app-builds:
    name: Build ${{ matrix.flavor }}
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
    needs: [workflow-policy, repository-security, android-quality, resolve-apps]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        flavor: ${{ fromJSON(needs.resolve-apps.outputs.flavors) }}
    env:
      FLAVOR: ${{ matrix.flavor }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
          check-latest: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Set up pinned Android SDK
        run: |
          set -euo pipefail
          bash scripts/ci/setup-android-sdk.sh

      - name: Generate CI-only Firebase placeholder
        run: |
          set -euo pipefail
          python3 scripts/ci/generate_ci_google_services.py --flavors "$FLAVOR"

      - name: Lint app flavor
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          cap="${FLAVOR^}"
          ./gradlew "lint${cap}Debug" --no-daemon --stacktrace --max-workers=2

      - name: Assemble app flavor
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          cap="${FLAVOR^}"
          ./gradlew "assemble${cap}Debug" --no-daemon --stacktrace --max-workers=2

      - name: Remove CI-only Firebase placeholder
        if: always()
        run: |
          set -euo pipefail
          python3 scripts/ci/generate_ci_google_services.py --clean --flavors "$FLAVOR"

  dependabot-smoke:
    name: Dependabot Smoke
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    needs: [workflow-policy, repository-security]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
          check-latest: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true

      - name: Validate dependency metadata
        run: |
          set -euo pipefail
          python3 scripts/ci/audit_dependency_catalog.py
          python3 scripts/ci/validate_supply_chain_policy.py

      - name: Run lightweight Gradle smoke check
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew help validateFlavorVersions --no-daemon --stacktrace --max-workers=2
