name: Physical Performance

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: Flavor name or all
        required: true
        default: all
        type: string
      suite:
        description: Benchmark suite
        required: true
        default: all
        type: choice
        options:
          - all
          - startup
          - frames
      iterations:
        description: Iterations per benchmark, clamped to 5..30
        required: true
        default: '10'
        type: string

permissions:
  contents: read

concurrency:
  group: physical-performance
  cancel-in-progress: false

jobs:
  benchmark:
    name: Physical Performance
    runs-on: [self-hosted, android-performance]
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
          check-latest: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true

      - name: Verify physical Android device
        run: |
          set -euo pipefail
          command -v adb
          mapfile -t devices < <(adb devices | awk 'NR > 1 && $2 == "device" { print $1 }')
          [[ "${#devices[@]}" -eq 1 ]] || {
            echo "::error::Physical performance runner requires exactly one authorized Android device; found ${#devices[@]}"
            adb devices -l
            exit 1
          }
          serial="${devices[0]}"
          case "$serial" in
            emulator-*|localhost:*|127.0.0.1:*)
              echo "::error::Emulator serial cannot produce physical performance evidence: $serial"
              exit 1
              ;;
          esac
          qemu="$(adb -s "$serial" shell getprop ro.kernel.qemu | tr -d '\r')"
          hardware="$(adb -s "$serial" shell getprop ro.hardware | tr -d '\r')"
          if [[ "$qemu" == "1" || "$hardware" =~ ^(ranchu|goldfish|cuttlefish|vbox86)$ ]]; then
            echo "::error::Emulated Android target cannot produce physical performance evidence: serial=$serial hardware=$hardware"
            adb devices -l
            exit 1
          fi

      - name: Run serial physical benchmarks
        env:
          PERFORMANCE_FLAVOR: ${{ inputs.flavor }}
          PERFORMANCE_SUITE: ${{ inputs.suite }}
          PERFORMANCE_ITERATIONS: ${{ inputs.iterations }}
        run: |
          set -euo pipefail
          bash scripts/ci/run_physical_performance.sh \
            "$PERFORMANCE_FLAVOR" \
            "$PERFORMANCE_SUITE" \
            "$PERFORMANCE_ITERATIONS" \
            build/physical-performance

      - name: Upload physical performance evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: physical-performance-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            build/physical-performance/
            performance/benchmark/build/outputs/
            performance/benchmark/build/reports/
          if-no-files-found: warn
          retention-days: 30
