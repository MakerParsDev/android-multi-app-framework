name: Baseline Profiles

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:
    inputs:
      flavor:
        description: Flavor name or all
        required: true
        default: all
        type: string
      open_pull_request:
        description: Update the automation profile PR after a full run
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: baseline-profiles-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve Performance Matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      flavors: ${{ steps.matrix.outputs.flavors }}
      count: ${{ steps.matrix.outputs.count }}
      full_run: ${{ steps.matrix.outputs.full_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve requested flavors
        id: matrix
        env:
          REQUESTED_FLAVOR: ${{ github.event_name == 'workflow_dispatch' && inputs.flavor || 'all' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          lines = subprocess.check_output(
              ["python3", "scripts/ci/resolve_ci_flavor_matrix.py"],
              text=True,
          ).splitlines()
          values = dict(line.split("=", 1) for line in lines if "=" in line)
          all_flavors = json.loads(values["flavors"])
          requested = os.environ["REQUESTED_FLAVOR"].strip()
          if requested == "all":
              selected = all_flavors
          elif requested in all_flavors:
              selected = [requested]
          else:
              raise SystemExit(f"Unknown performance flavor: {requested}")
          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
              handle.write(f"flavors={json.dumps(selected, separators=(',', ':'))}\n")
              handle.write(f"count={len(selected)}\n")
              handle.write(f"full_run={'true' if selected == all_flavors else 'false'}\n")
          PY

  generate:
    name: Generate ${{ matrix.flavor }} profile
    needs: [resolve]
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        flavor: ${{ fromJSON(needs.resolve.outputs.flavors) }}
    env:
      FLAVOR: ${{ matrix.flavor }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
          check-latest: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true

      - name: Set up pinned Android SDK
        run: |
          set -euo pipefail
          bash scripts/ci/setup-android-sdk.sh
          bash scripts/ci/setup-performance-device-sdk.sh

      - name: Enable KVM acceleration
        run: |
          set -euo pipefail
          if [[ ! -e /dev/kvm ]]; then
            echo '::error::GitHub runner does not expose /dev/kvm'
            exit 1
          fi
          sudo chmod 0666 /dev/kvm
          stat --format='%A %a %U:%G %n' /dev/kvm
          test -r /dev/kvm
          test -w /dev/kvm

      - name: Generate CI-only Firebase placeholder
        run: |
          set -euo pipefail
          python3 scripts/ci/generate_ci_google_services.py --flavors "$FLAVOR"

      - name: Generate variant Baseline Profile
        run: |
          set -euo pipefail
          task="$(python3 scripts/ci/performance_profile_policy.py task --flavor "$FLAVOR")"
          ./gradlew ":app:$task" \
            -PciSmoke=true \
            -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.enabledRules=BaselineProfile \
            -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.suppressErrors=EMULATOR \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            --no-daemon \
            --no-configuration-cache \
            --stacktrace \
            --max-workers=2

      - name: Validate and stage profile pair
        run: |
          set -euo pipefail
          python3 scripts/ci/performance_profile_policy.py validate-source --flavor "$FLAVOR"
          source_dir="app/src/${FLAVOR}Release/generated/baselineProfiles"
          target_dir="performance-artifacts/$FLAVOR"
          mkdir -p "$target_dir"
          install -m 0644 "$source_dir/baseline-prof.txt" "$target_dir/baseline-prof.txt"
          install -m 0644 "$source_dir/startup-prof.txt" "$target_dir/startup-prof.txt"

      - name: Remove CI-only Firebase placeholder
        if: always()
        run: |
          set -euo pipefail
          python3 scripts/ci/generate_ci_google_services.py --clean --flavors "$FLAVOR"

      - name: Upload profile pair
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: baseline-profile-${{ matrix.flavor }}-${{ github.sha }}
          path: performance-artifacts/
          if-no-files-found: error
          retention-days: 14

      - name: Upload profile diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-diagnostics-${{ matrix.flavor }}-${{ github.sha }}
          path: |
            performance/benchmark/build/outputs/
            performance/benchmark/build/reports/
          if-no-files-found: warn
          retention-days: 14

  aggregate:
    name: Aggregate Baseline Profiles
    needs: [resolve, generate]
    if: needs.generate.result == 'success' && needs.resolve.outputs.full_run == 'true' && vars.PERFORMANCE_AUTOMATION_ENABLED == 'true' && (github.event_name == 'schedule' || inputs.open_pull_request == true)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Create repository automation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.PERFORMANCE_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PERFORMANCE_AUTOMATION_PRIVATE_KEY }}
          repositories: android-multi-app-framework
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Download all profile pairs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: baseline-profile-*
          path: downloaded-profiles
          merge-multiple: true

      - name: Resolve automation identity
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          printf 'AUTOMATION_APP_SLUG=%s\n' "$APP_SLUG" >> "$GITHUB_ENV"
          printf 'AUTOMATION_APP_USER_ID=%s\n' "$user_id" >> "$GITHUB_ENV"

      - name: Update Baseline Profile pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          bash scripts/ci/update_baseline_profile_pr.sh downloaded-profiles
