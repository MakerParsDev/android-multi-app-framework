name: Connected Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

concurrency:
  group: connected-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_OPTS: '-Djava.awt.headless=true -Dorg.gradle.workers.max=2 -Dorg.gradle.daemon=false -Dksp.incremental=false'
  JAVA_VERSION: '21'

jobs:
  instrumentation-tests:
    name: Instrumentation Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
          check-latest: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true

      - name: Set up pinned Android SDK
        run: |
          set -euo pipefail
          bash scripts/ci/setup-android-sdk.sh
          bash scripts/ci/setup_managed_device_sdk.sh

      - name: Enable KVM acceleration
        run: |
          set -euo pipefail
          if [[ ! -e /dev/kvm ]]; then
            echo '::error::GitHub runner does not expose /dev/kvm'
            exit 1
          fi
          sudo chmod 0666 /dev/kvm
          stat --format='%A %a %U:%G %n' /dev/kvm
          test -r /dev/kvm
          test -w /dev/kvm

      - name: Generate CI-only Firebase placeholder
        run: |
          set -euo pipefail
          python3 scripts/ci/generate_ci_google_services.py --flavors kuran_kerim

      - name: Run managed-device instrumentation tests
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew \
            ciPixel2Api30Kuran_kerimDebugAndroidTest \
            -PciSmoke=true \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            --no-daemon \
            --no-configuration-cache \
            --stacktrace \
            --max-workers=2

      - name: Remove CI-only Firebase placeholder
        if: always()
        run: |
          set -euo pipefail
          python3 scripts/ci/generate_ci_google_services.py --clean --flavors kuran_kerim

      - name: Upload managed-device reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: connected-test-results-${{ github.sha }}
          path: |
            app/build/reports/androidTests/managedDevice/
            app/build/outputs/androidTest-results/managedDevice/
          if-no-files-found: warn
          retention-days: 14
