name: Connected Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1' # Monday 04:00 UTC (optional)

concurrency:
  group: connected-tests
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_OPTS: '-Djava.awt.headless=true -Dorg.gradle.workers.max=2 -Dorg.gradle.daemon=false -Dksp.incremental=false'
  JAVA_VERSION: '21'

jobs:
  instrumentation-tests:
    name: Instrumentation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Setup Android SDK
        run: bash scripts/ci/setup-android-sdk.sh

      - name: Start emulator
        run: |
          # Use Android emulator action or setup
          echo "Setting up Android emulator..."
          # For managed device tests, Gradle handles the emulator
          # For connected tests, ensure an emulator is running

      - name: Run connected smoke tests
        run: |
          adb start-server || true
          ./gradlew :app:connectedAmenerrasuluDebugAndroidTest \
            --stacktrace --no-daemon --max-workers=2 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: connected-test-results
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          retention-days: 14
