---
name: release-health-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

parameters:
  - name: checkpointHours
    displayName: Post-release checkpoint
    type: number
    default: 24
    values:
      - 24
      - 48
      - 72
  - name: snapshotSecureFile
    displayName: Secure file containing the release health snapshot JSON
    type: string
    default: release-health-snapshot.json
  - name: failOn
    displayName: Decision level that blocks the pipeline
    type: string
    default: hotfix
    values:
      - watch
      - hotfix
      - rollback

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    clean: true
    fetchDepth: 0

  - template: /pipelines/templates/steps/security-gate.yml
    parameters:
      mode: history
      selfTest: false

  - task: DownloadSecureFile@1
    name: healthSnapshot
    displayName: Download release health snapshot
    inputs:
      secureFile: ${{ parameters.snapshotSecureFile }}

  - bash: |
      set -euo pipefail
      python3 scripts/ci/validate_runtime_observability.py
      python3 scripts/ci/evaluate_release_health.py \
        --snapshot "$(healthSnapshot.secureFilePath)" \
        --expected-checkpoint "${{ parameters.checkpointHours }}" \
        --fail-on "${{ parameters.failOn }}"
    displayName: Evaluate release health decision

  - task: PublishPipelineArtifact@1
    displayName: Publish release health decision
    condition: always()
    inputs:
      targetPath: build/reports/release-health
      artifact: release-health-${{ parameters.checkpointHours }}h
